<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Master Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d;
    --surface: #111318;
    --surface2: #181c23;
    --border: #252930;
    --border-bright: #363d48;
    --amber: #f5a623;
    --amber-dim: #c47d10;
    --amber-glow: rgba(245,166,35,0.12);
    --green: #3dffa0;
    --green-dim: rgba(61,255,160,0.15);
    --red: #ff4e6a;
    --text: #e8eaf0;
    --text-dim: #6b7280;
    --text-mid: #9ca3af;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    gap: 16px;
  }

  .logo-block h1 {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  .logo-block h1 span {
    color: var(--amber);
  }

  .logo-block p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .version-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--amber);
    background: var(--amber-glow);
    border: 1px solid rgba(245,166,35,0.3);
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* Form sections */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Tool grid */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-bottom: 28px;
  }

  .tool-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .tool-btn .tool-icon {
    font-size: 16px;
    margin-bottom: 2px;
  }

  .tool-btn .tool-name {
    color: var(--text);
    font-weight: 700;
    font-size: 11px;
  }

  .tool-btn .tool-tag {
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 0.05em;
  }

  .tool-btn:hover {
    border-color: var(--amber-dim);
    background: var(--surface2);
    color: var(--text);
  }

  .tool-btn.selected {
    border-color: var(--amber);
    background: var(--amber-glow);
    color: var(--amber);
  }

  .tool-btn.selected .tool-name {
    color: var(--amber);
  }

  /* Textarea */
  .idea-wrapper {
    position: relative;
    margin-bottom: 28px;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    border-radius: 3px;
    transition: border-color 0.15s ease;
  }

  textarea::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  textarea:focus {
    border-color: var(--border-bright);
  }

  /* Advanced options */
  .options-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .option-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    user-select: none;
  }

  .option-chip input { display: none; }

  .option-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1px solid var(--text-dim);
    flex-shrink: 0;
    transition: all 0.15s ease;
  }

  .option-chip.active {
    border-color: var(--green);
    background: var(--green-dim);
    color: var(--green);
  }

  .option-chip.active .dot {
    background: var(--green);
    border-color: var(--green);
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--amber);
    color: #0a0b0d;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover:not(:disabled) {
    background: #f0b942;
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .generate-btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { opacity: 0.6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output */
  .output-section {
    margin-top: 40px;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .meta-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 0.08em;
  }

  .meta-tool {
    background: var(--amber-glow);
    color: var(--amber);
    border: 1px solid rgba(245,166,35,0.25);
  }

  .meta-tokens {
    background: rgba(61,255,160,0.08);
    color: var(--green);
    border: 1px solid rgba(61,255,160,0.2);
  }

  .copy-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s ease;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: auto;
  }

  .copy-btn:hover {
    border-color: var(--amber-dim);
    color: var(--amber);
  }

  .copy-btn.copied {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  .prompt-output {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    padding: 20px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 0 3px 3px 0;
    max-height: 480px;
    overflow-y: auto;
  }

  .prompt-output::-webkit-scrollbar { width: 4px; }
  .prompt-output::-webkit-scrollbar-track { background: var(--surface); }
  .prompt-output::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .strategy-note {
    margin-top: 14px;
    padding: 12px 16px;
    background: rgba(61,255,160,0.05);
    border: 1px solid rgba(61,255,160,0.15);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  .strategy-note strong {
    color: var(--green);
    font-weight: 700;
  }

  /* Error */
  .error-box {
    margin-top: 20px;
    padding: 14px 16px;
    background: rgba(255,78,106,0.08);
    border: 1px solid rgba(255,78,106,0.3);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    animation: fadeUp 0.3s ease;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 36px 0;
  }

  /* History */
  .history-item {
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .history-item:hover { border-color: var(--border-bright); }

  .history-idea {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .history-tool-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--amber);
    background: var(--amber-glow);
    border: 1px solid rgba(245,166,35,0.2);
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .empty-history {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
    border: 1px dashed var(--border);
    border-radius: 3px;
  }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--amber);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.9s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @media (max-width: 600px) {
    .tool-grid { grid-template-columns: repeat(3, 1fr); }
    header { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-block">
      <h1>PROMPT<span>MASTER</span></h1>
      <p>Production-ready prompts · First try, every time</p>
    </div>
    <div class="version-badge">v1.4.0</div>
  </header>

  <!-- TOOL SELECTOR -->
  <div class="section-label">01 · Target Tool</div>
  <div class="tool-grid" id="toolGrid">
    <button class="tool-btn" data-tool="Claude"><span class="tool-icon">✦</span><span class="tool-name">Claude</span><span class="tool-tag">claude.ai / API</span></button>
    <button class="tool-btn" data-tool="ChatGPT / GPT-4o"><span class="tool-icon">⊡</span><span class="tool-name">ChatGPT</span><span class="tool-tag">GPT-4o</span></button>
    <button class="tool-btn" data-tool="o1 / o3"><span class="tool-icon">◎</span><span class="tool-name">o1 / o3</span><span class="tool-tag">Reasoning</span></button>
    <button class="tool-btn" data-tool="Cursor"><span class="tool-icon">⌥</span><span class="tool-name">Cursor</span><span class="tool-tag">IDE AI</span></button>
    <button class="tool-btn" data-tool="Claude Code"><span class="tool-icon">⌘</span><span class="tool-name">Claude Code</span><span class="tool-tag">Agentic</span></button>
    <button class="tool-btn" data-tool="Gemini 2.x"><span class="tool-icon">◈</span><span class="tool-name">Gemini</span><span class="tool-tag">2.x Pro</span></button>
    <button class="tool-btn" data-tool="Midjourney"><span class="tool-icon">◐</span><span class="tool-name">Midjourney</span><span class="tool-tag">Image</span></button>
    <button class="tool-btn" data-tool="n8n"><span class="tool-icon">⇌</span><span class="tool-name">n8n</span><span class="tool-tag">Workflow</span></button>
    <button class="tool-btn" data-tool="Qwen3"><span class="tool-icon">◑</span><span class="tool-name">Qwen3</span><span class="tool-tag">Thinking</span></button>
    <button class="tool-btn" data-tool="ElevenLabs"><span class="tool-icon">♪</span><span class="tool-name">ElevenLabs</span><span class="tool-tag">Voice AI</span></button>
    <button class="tool-btn" data-tool="Stable Diffusion"><span class="tool-icon">⬡</span><span class="tool-name">Stable Diff</span><span class="tool-tag">Image</span></button>
    <button class="tool-btn" data-tool="Perplexity"><span class="tool-icon">∞</span><span class="tool-name">Perplexity</span><span class="tool-tag">Research</span></button>
  </div>

  <!-- IDEA INPUT -->
  <div class="section-label">02 · Rough Idea</div>
  <div class="idea-wrapper">
    <textarea id="ideaInput" placeholder="Describe what you want the AI to do. Rough is fine — I'll extract the intent and engineer the prompt...

e.g. 'write a pyspark script that cleans commodity prices data and flags outliers using z-score' for Cursor"></textarea>
  </div>

  <!-- OPTIONS -->
  <div class="section-label">03 · Options</div>
  <div class="options-row" id="optionsRow">
    <label class="option-chip" id="chip-agentic">
      <input type="checkbox" id="opt-agentic">
      <span class="dot"></span>Agentic task
    </label>
    <label class="option-chip" id="chip-structured">
      <input type="checkbox" id="opt-structured">
      <span class="dot"></span>Structured output
    </label>
    <label class="option-chip" id="chip-fewshot">
      <input type="checkbox" id="opt-fewshot">
      <span class="dot"></span>Include few-shot
    </label>
    <label class="option-chip" id="chip-grounding">
      <input type="checkbox" id="opt-grounding">
      <span class="dot"></span>Grounding anchor
    </label>
  </div>

  <!-- GENERATE -->
  <button class="generate-btn" id="generateBtn" onclick="generatePrompt()">
    <div class="spinner"></div>
    <span class="btn-text">Generate Prompt →</span>
  </button>

  <!-- OUTPUT -->
  <div id="outputSection" style="display:none" class="output-section">
    <div class="output-meta">
      <span class="meta-pill meta-tool" id="metaTool"></span>
      <span class="meta-pill meta-tokens" id="metaTokens"></span>
      <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>
    </div>
    <div class="prompt-output" id="promptOutput"></div>
    <div class="strategy-note" id="strategyNote"></div>
  </div>

  <div id="errorBox" style="display:none" class="error-box"></div>

  <!-- HISTORY -->
  <div class="divider"></div>
  <div class="section-label">Recent</div>
  <div id="historyList">
    <div class="empty-history">Generated prompts will appear here</div>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are a prompt engineer from the Prompt Master v1.4.0 system. You take rough user ideas and transform them into single, production-ready prompts optimized for the specified target tool.

## Hard Rules — NEVER violate
- Output a single ready-to-paste prompt block
- NEVER embed fabricated techniques: Mixture of Experts, Tree of Thought, Graph of Thought, Universal Self-Consistency, or layered prompt chaining
- NEVER add Chain of Thought instructions to reasoning-native models (o1, o3, DeepSeek-R1, Qwen3 thinking mode)
- Constraints and critical rules go in the first 30% of the prompt
- Use MUST over "should". Use NEVER over "avoid".
- Zero wasted tokens. Every sentence must be load-bearing.

## Tool Routing
Apply these tool-specific rules silently based on the target:

**Claude (claude.ai, API)**: XML tags for multi-component prompts (<context>, <task>, <constraints>, <examples>, <output_format>). Explain WHY not just WHAT. Explicit output format. Don't over-constrain.

**ChatGPT / GPT-4o**: Strong role in system message. Numbered steps. Add "Skip preamble. No caveats. Answer directly." Set a word count cap. Crisp numeric constraints.

**o1 / o3 (OpenAI reasoning)**: SHORT clean instructions ONLY. NEVER add CoT or "think step by step". Plain text, under 200 words. State goal and success criteria only.

**Cursor / IDE AI**: Explicit file and function scope. Add "Only modify the file/function specified. Do not refactor or add features beyond the request." List exact inputs/outputs expected.

**Claude Code (agentic)**: Include current project state. Define target state. Add "After each step output: ✅ [what was completed]". Add "Stop and ask before: [destructive actions]". Scope filesystem explicitly.

**Gemini 2.x**: Add "Cite only sources you are certain of. If uncertain, say [uncertain]." Explicit format lock. "Base your response only on provided context. Do not extrapolate."

**Midjourney**: Subject, art style, lighting, camera/lens, mood, color palette, aspect ratio flag, quality flag, negative prompt.

**Stable Diffusion**: Separate Positive and Negative prompts. Booru-style comma-separated tags. Specify model if known (SDXL, SD1.5 etc). Quality boosters, lighting, style tags.

**Qwen3 (thinking mode)**: Treat like o1 — short, clean, no CoT. If non-thinking mode treat like GPT-4o with role assignment.

**n8n / Zapier / Make**: Trigger app + event → action app + action + field mapping. Number each step. Note auth requirements.

**ElevenLabs**: Emotion + pacing + emphasis markers + speech rate. Specify voice profile. SSML-like stress markers.

**Perplexity**: Research-framed query. Add "Cite specific sources. Prefer primary sources. If uncertain, say so." Specify recency if needed.

## Diagnostic — silently fix these patterns
- Vague task verb → precise operation
- No output format → derive and add explicit format lock
- No role assignment for complex tasks → add expert identity
- Missing scope boundaries → add explicit scope lock
- Fabrication risk → add grounding anchor
- Agentic task → add checkpoint and stop conditions

## Output format — ALWAYS follow exactly
Return a JSON object with exactly these keys:
{
  "prompt": "the full ready-to-paste prompt",
  "tool_template": "e.g. Claude · Instructional · ~180 tokens",
  "strategy": "one sentence describing the key optimization made"
}

Return ONLY valid JSON. No markdown fences, no preamble.`;

let selectedTool = null;
let history = [];
let currentPrompt = '';

// Tool selection
document.getElementById('toolGrid').addEventListener('click', e => {
  const btn = e.target.closest('.tool-btn');
  if (!btn) return;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTool = btn.dataset.tool;
});

// Option chips
document.querySelectorAll('.option-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chip.classList.toggle('active');
  });
});

async function generatePrompt() {
  const idea = document.getElementById('ideaInput').value.trim();
  
  if (!idea) {
    showError('Please describe your rough idea first.');
    return;
  }
  if (!selectedTool) {
    showError('Please select a target tool first.');
    return;
  }

  const opts = {
    agentic: document.getElementById('chip-agentic').classList.contains('active'),
    structured: document.getElementById('chip-structured').classList.contains('active'),
    fewshot: document.getElementById('chip-fewshot').classList.contains('active'),
    grounding: document.getElementById('chip-grounding').classList.contains('active'),
  };

  const optNotes = Object.entries(opts)
    .filter(([,v]) => v)
    .map(([k]) => ({ agentic: 'This is an agentic task — add checkpoints and stop conditions.', structured: 'Include structured output format (JSON schema or explicit template).', fewshot: 'Include 2-3 few-shot examples to lock the format.', grounding: 'Add a strong grounding anchor to prevent hallucination.' }[k]))
    .join(' ');

  const userMessage = `Target tool: ${selectedTool}
Rough idea: ${idea}${optNotes ? '\nAdditional requirements: ' + optNotes : ''}`;

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-text').textContent = 'Engineering...';

  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('outputSection').style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userMessage }]
      })
    });

    const data = await response.json();
    const raw = data.content?.map(c => c.text || '').join('') || '';

    let parsed;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('Could not parse response. Raw: ' + raw.slice(0, 200));
    }

    currentPrompt = parsed.prompt;
    renderOutput(parsed, selectedTool, idea);
    addToHistory(idea, selectedTool, parsed.prompt);

  } catch (err) {
    showError('Error: ' + (err.message || 'Something went wrong.'));
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = 'Generate Prompt →';
  }
}

function renderOutput(parsed, tool, idea) {
  document.getElementById('metaTool').textContent = tool.toUpperCase();
  document.getElementById('metaTokens').textContent = parsed.tool_template || '';
  document.getElementById('promptOutput').textContent = parsed.prompt;
  document.getElementById('strategyNote').innerHTML = '<strong>◆ Strategy:</strong> ' + (parsed.strategy || '');
  document.getElementById('outputSection').style.display = 'block';
  document.getElementById('copyBtn').textContent = 'Copy';
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyPrompt() {
  if (!currentPrompt) return;
  navigator.clipboard.writeText(currentPrompt).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

function addToHistory(idea, tool, prompt) {
  history.unshift({ idea, tool, prompt });
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) {
    el.innerHTML = '<div class="empty-history">Generated prompts will appear here</div>';
    return;
  }
  el.innerHTML = history.map((item, i) => `
    <div class="history-item" onclick="restoreHistory(${i})">
      <span class="history-idea">${escapeHtml(item.idea)}</span>
      <span class="history-tool-tag">${escapeHtml(item.tool)}</span>
    </div>
  `).join('');
}

function restoreHistory(i) {
  const item = history[i];
  currentPrompt = item.prompt;
  document.getElementById('promptOutput').textContent = item.prompt;
  document.getElementById('metaTool').textContent = item.tool.toUpperCase();
  document.getElementById('metaTokens').textContent = '';
  document.getElementById('strategyNote').innerHTML = '<strong>◆ Restored from history</strong>';
  document.getElementById('outputSection').style.display = 'block';
  document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key shortcut
document.getElementById('ideaInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generatePrompt();
});
</script>
</body>
</html>
